name: Build unsigned IPA

# Produces an UNSIGNED .ipa you can download and sideload (AltStore / Sideloadly).
# Run it manually from the Actions tab, or by pushing a tag like v1.0.0.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble web assets into www/
        run: |
          mkdir -p www
          cp index.html manifest.webmanifest sw.js icon-192.png icon-512.png apple-touch-icon.png www/

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Generate native app icons
        run: npx capacitor-assets generate --ios --iconBackgroundColor "#101615" --iconBackgroundColorDark "#101615" || echo "icon generation skipped"

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Build unsigned .app
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then MV="${GITHUB_REF_NAME#v}"; else MV="1.3.0"; fi
          echo "Marketing version: $MV"
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            MARKETING_VERSION="$MV" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into unsigned .ipa
        run: |
          APP_DIR="ios/App/build/Build/Products/Release-iphoneos"
          if [ ! -d "$APP_DIR/App.app" ]; then
            echo "App.app not found in $APP_DIR"; ls -la "$APP_DIR" || true; exit 1
          fi
          cd "$APP_DIR"
          mkdir -p Payload
          cp -R App.app Payload/
          zip -qry app.ipa Payload
          mkdir -p "$GITHUB_WORKSPACE/dist"
          mv app.ipa "$GITHUB_WORKSPACE/dist/WeeklyFocusTimer-unsigned.ipa"
          echo "Built:"; ls -la "$GITHUB_WORKSPACE/dist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyFocusTimer-unsigned-ipa
          path: dist/WeeklyFocusTimer-unsigned.ipa
          if-no-files-found: error

      - name: Build release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Pull the "## [VER] ..." section out of CHANGELOG.md
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Trim leading/trailing blank lines; fall back if the version is missing
          sed -i -e '/./,$!d' RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf "Weekly Focus Timer %s\n" "$VER" > RELEASE_NOTES.md
          fi
          cat >> RELEASE_NOTES.md <<'EOF'

---
**Install:** download `WeeklyFocusTimer-unsigned.ipa` below and sideload it (AltStore / Sideloadly / signing service — it's signed with your own Apple ID at install time). Bundle ID `com.chimpinski.weeklyfocus`, min iOS 13.

Prefer no sideloading? It's also a PWA — open https://chimpinski.github.io/Weekly-Focus-Tracker/ in Safari and choose **Add to Home Screen**.

Full history: [CHANGELOG.md](https://github.com/Chimpinski/Weekly-Focus-Tracker/blob/main/CHANGELOG.md)
EOF

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} — Weekly Focus Timer
          files: dist/WeeklyFocusTimer-unsigned.ipa
          fail_on_unmatched_files: true
          body_path: RELEASE_NOTES.md
