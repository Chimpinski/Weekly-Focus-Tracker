name: Build unsigned IPA

# Produces an UNSIGNED .ipa you can download and sideload (AltStore / Sideloadly).
# Run it manually from the Actions tab, or by pushing a tag like v1.0.0.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble web assets into www/
        run: |
          mkdir -p www
          cp index.html manifest.webmanifest sw.js icon-192.png icon-512.png apple-touch-icon.png www/

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Generate native app icons
        run: npx capacitor-assets generate --ios --iconBackgroundColor "#101615" --iconBackgroundColorDark "#101615" || echo "icon generation skipped"

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Inject Live Activity extension and plugin
        run: |
          # Copy native sources into the generated project
          cp -R native/ios/WeeklyWidget ios/App/WeeklyWidget
          cp -R native/ios/Shared ios/App/Shared
          cp -R native/ios/LiveTimer ios/App/App/LiveTimer
          # Declare Live Activity support in the app's Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSSupportsLiveActivities bool true" ios/App/App/Info.plist
          # Add the widget target + plugin files to the Xcode project
          sudo gem install xcodeproj -N
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then export MV="${GITHUB_REF_NAME#v}"; else export MV="1.1.1"; fi
          ruby scripts/add_widget.rb

      - name: Build unsigned .app
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then MV="${GITHUB_REF_NAME#v}"; else MV="1.1.1"; fi
          echo "Marketing version: $MV"
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            MARKETING_VERSION="$MV" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into unsigned .ipa
        run: |
          APP_DIR="ios/App/build/Build/Products/Release-iphoneos"
          if [ ! -d "$APP_DIR/App.app" ]; then
            echo "App.app not found in $APP_DIR"; ls -la "$APP_DIR" || true; exit 1
          fi
          cd "$APP_DIR"
          mkdir -p Payload
          cp -R App.app Payload/
          zip -qry app.ipa Payload
          mkdir -p "$GITHUB_WORKSPACE/dist"
          mv app.ipa "$GITHUB_WORKSPACE/dist/WeeklyFocusTimer-unsigned.ipa"
          echo "Built:"; ls -la "$GITHUB_WORKSPACE/dist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeeklyFocusTimer-unsigned-ipa
          path: dist/WeeklyFocusTimer-unsigned.ipa
          if-no-files-found: error

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} — Weekly Focus Timer
          files: dist/WeeklyFocusTimer-unsigned.ipa
          fail_on_unmatched_files: true
          body: |
            Unsigned `.ipa` for personal sideloading (AltStore / Sideloadly sign it with your Apple ID at install time).

            Bundle ID `com.chimpinski.weeklyfocus`. Min iOS 13; the Live Activity (lock-screen/Dynamic Island timer with pause/play) requires iOS 17+.

            Prefer no sideloading? The app is also a PWA — open
            https://chimpinski.github.io/Weekly-Focus-Tracker/ in Safari and choose **Add to Home Screen**.
